<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gorilla Tag VR Clássico 🦍🥽</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        
        /* Divide a tela perfeitamente ao meio para o VR Box */
        .vr-container { display: flex; width: 100%; height: 100%; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 2px solid #000; }
        .view:last-child { border-right: none; }

        /* Desenho do cenário (Céu, Chão e Árvores) */
        .sky { width: 100%; height: 60%; background: #87CEEB; }
        .ground { width: 100%; height: 40%; background: #228B22; position: relative; }
        
        /* Árvores e Blocos simulando 3D */
        .tree-trunk { width: 40px; height: 120px; background: #8B4513; position: absolute; bottom: 30%; left: 40%; }
        .tree-leaves { width: 100px; height: 100px; background: #2e8b57; border-radius: 50%; position: absolute; bottom: 80%; left: -30px; }
        .block { width: 60px; height: 60px; background: #A0522D; position: absolute; bottom: 10%; left: 70%; }

        /* Texto de aviso */
        .info { position: absolute; top: 10%; width: 100%; text-align: center; color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <!-- O JOGO DIVIDIDO PARA O ÓCULOS -->
    <div class="vr-container" id="game-screen">
        
        <!-- OLHO ESQUERDO -->
        <div class="view">
            <div class="sky"></div>
            <div class="ground">
                <div class="tree-trunk"><div class="tree-leaves"></div></div>
                <div class="block"></div>
            </div>
            <div class="info">TOQUE PARA PULAR! 🦍</div>
        </div>

        <!-- OLHO DIREITO -->
        <div class="view">
            <div class="sky"></div>
            <div class="ground">
                <div class="tree-trunk"><div class="tree-leaves"></div></div>
                <div class="block"></div>
            </div>
            <div class="info">TOQUE PARA PULAR! 🦍</div>
        </div>

    </div>

    <script>
        const gameScreen = document.getElementById('game-screen');
        let isJumping = false;

        // Efeito de pulo simples ao clicar na tela ou no botão do VR Box
        window.addEventListener('click', () => {
            if (!isJumping) {
                isJumping = true;
                
                // Faz as duas telas darem um solavanco para baixo (parecendo que o macaco pulou!)
                gameScreen.style.transition = "transform 0.2s ease-out";
                gameScreen.style.transform = "translateY(80px)";
                
                setTimeout(() => {
                    gameScreen.style.transition = "transform 0.4s ease-in";
                    gameScreen.style.transform = "translateY(0px)";
                    isJumping = false;
                }, 200);
            }
        });
    </script>
</body>
</html>
