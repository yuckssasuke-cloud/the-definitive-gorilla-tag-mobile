<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Tag VR Clássico 🦍🥽</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>

    <!-- Jogo limpo, sem pedir câmera para não dar erro nos navegadores! -->
    <a-scene xr-mode-ui="enabled: true">
        
        <!-- CÉU AZUL SEGURO -->
        <a-sky color="#87CEEB"></a-sky>

        <!-- CHÃO -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

        <!-- ÁRVORES E BLOCOS PARA PARKOUR -->
        <a-box position="-5 1.5 -10" width="3" height="3" depth="3" color="#8B4513"></a-box>
        <a-box position="5 3 -15" width="4" height="6" depth="4" color="#8B4513"></a-box>
        <a-box position="0 2 -8" width="2" height="4" depth="2" color="#A0522D"></a-box>
        <a-sphere position="0 5 -8" radius="3" color="#2e8b57"></a-sphere> 
        <a-box position="-2 4 -12" width="3" height="1" depth="3" color="#556B2F"></a-box>

        <!-- JOGADOR (Câmera + Pulo pelo botão) -->
        <a-entity id="player" position="0 0 0">
            <a-camera id="camera" look-controls>
                <a-cursor color="#FF0000"></a-cursor>
            </a-camera>
        </a-entity>

    </a-scene>

    <script>
        const player = document.getElementById('player');
        const camera = document.getElementById('camera');
        
        let velocityY = 0;
        let isGrounded = true;
        const gravity = -9.8; 
        let pos = { x: 0, y: 0, z: 0 };

        // Pulo ativado pelo clique na tela ou botão do VR Box!
        window.addEventListener('click', () => {
            if (isGrounded) {
                const direction = new THREE.Vector3();
                camera.object3D.getWorldDirection(direction);

                // Força do pulo para frente e para cima
                velocityY = 6; 
                isGrounded = false;

                pos.x += -direction.x * 5;
                pos.z += -direction.z * 5;
            }
        });

        function updatePhysics(time, timeDelta) {
            const dt = timeDelta / 1000;

            if (!isGrounded) {
                velocityY += gravity * dt;
                pos.y += velocityY * dt;

                if (pos.y <= 0) {
                    pos.y = 0;
                    velocityY = 0;
                    isGrounded = true;
                }

                player.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            }

            requestAnimationFrame(() => updatePhysics(performance.now(), performance.now() - time));
        }

        updatePhysics(performance.now(), 0);
    </script>
</body>
</html>
